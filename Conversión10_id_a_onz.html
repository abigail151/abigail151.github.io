<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversión de Libras a Onzas</title>
    <link rel="stylesheet" href="PA20.-Conversiónes.css">
</head>
<body>
    <center>
        <div id="Cont10">
            <h1 style="color: aliceblue;">Conversión de Libras</h1>
            <h2 style="color: aliceblue;">Introduce una cantidad en Libras :</h2>
                <input type="text" name="num1" id="num1">
                <br><br>
                <input style="background-color: black; color: aliceblue;" type="button" name="aceptar" id="aceptar" value="Convertir" onclick="Converción()">
                <br><br>
                <h3 style="color: aliceblue;">El resultado de Onzas es : </h3>
                <input type="text" name="result" id="result">
                <br><br>
                <br><br>
                <br><br>
                <a style="color: aliceblue;" href="Menu.html">REGRESAR AL MENU</a>
        </div>
    </center>
    <script>
        function Converción()
        {
            var lib1 = document.getElementById('num1').value;
            var operación = lib1 * 16;
            document.getElementById('result').value = operación;
        }
    </script>
